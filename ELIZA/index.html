<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reiwa ELIZA</title>
    <style>
        /* 見た目（CSS）をここに集約 */
        body {
            background-color: #0c0c0c;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        #chat-container {
            width: 90%;
            max-width: 800px;
            height: 80vh;
            border: 1px solid #00ff00;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
        }
        #chat-log {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 20px;
            padding-right: 10px;
        }
        .message { margin-bottom: 12px; line-height: 1.5; }
        .user { color: #ffffff; }
        .bot { color: #00ff00; }
        #input-area {
            display: flex;
            border-top: 1px solid #00ff00;
            padding-top: 15px;
        }
        .prompt { margin-right: 10px; font-weight: bold; }
        #user-input {
            background: transparent;
            border: none;
            color: #ffffff;
            font-family: inherit;
            font-size: 1rem;
            width: 100%;
            outline: none;
        }
        /* スクロールバーのカスタマイズ */
        #chat-log::-webkit-scrollbar { width: 5px; }
        #chat-log::-webkit-scrollbar-thumb { background: #00ff00; }
    </style>
</head>
<body>

    <div id="chat-container">
        <div id="chat-log">
            <div class="message bot">ELIZA: こんにちは。私はELIZAです。何かお話ししましょう。</div>
        </div>
        <div id="input-area">
            <span class="prompt">></span>
            <input type="text" id="user-input" placeholder="メッセージを入力..." autofocus autocomplete="off">
        </div>
    </div>

    <script>
        /*
        Version: 1.3.1
        Created: 2026-03-20
        概要: 1966年のELIZAをブラウザ上で再現。HTML/CSS/JSを統合したシングルファイル版。
        変更内容: CSSとJSをindex.htmlに統合。
        更新履歴: 2026-03-20 V1.3.1 : シングルファイル構成への変更。
        分類: 自然言語処理（ルールベース）
        依存関係: pairs.json (外部読み込み)
        */

        class ReiwaEliza {
            constructor() {
                this.pairs = [];
                this.loadData();
            }

            // 外部JSONファイルを読み込む
            async loadData() {
                try {
                    const response = await fetch('pairs.json');
                    if (!response.ok) throw new Error('Network response was not ok');
                    this.pairs = await response.json();
                } catch (error) {
                    this.addLog("システムエラー: pairs.json が読み込めません。ファイルを同じフォルダに置いてください。", "bot");
                    console.error('Error loading JSON:', error);
                }
            }

            respond(text) {
                for (let item of this.pairs) {
                    const re = new RegExp(item.pattern, "i");
                    const match = text.match(re);
                    if (match) {
                        let response = item.responses[Math.floor(Math.random() * item.responses.length)];
                        // マッチしたグループを {0}, {1}... に置換
                        if (match.length > 1) {
                            for (let i = 1; i < match.length; i++) {
                                // 正規表現の特殊文字を除去してオウム返しに利用
                                let captured = (match[i] || "").trim();
                                response = response.replace(new RegExp(`\\{${i-1}\\}`, 'g'), captured);
                            }
                        }
                        return response;
                    }
                }
                return "もう少し詳しく教えてください。";
            }

            addLog(text, sender) {
                const log = document.getElementById('chat-log');
                const div = document.createElement('div');
                div.className = `message ${sender}`;
                div.innerText = sender === "bot" ? `ELIZA: ${text}` : `YOU: ${text}`;
                log.appendChild(div);
                log.scrollTop = log.scrollHeight; // 常に最新のメッセージを表示
            }
        }

        // 初期化
        const eliza = new ReiwaEliza();
        const input = document.getElementById('user-input');

        // 入力イベント
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && input.value.trim() !== "") {
                const text = input.value;
                eliza.addLog(text, "user");
                input.value = "";
                
                // 少し間を置いて返信（人間味を出す演出）
                setTimeout(() => {
                    const reply = eliza.respond(text);
                    eliza.addLog(reply, "bot");
                }, 600);
            }
        });
    </script>
</body>
</html>
