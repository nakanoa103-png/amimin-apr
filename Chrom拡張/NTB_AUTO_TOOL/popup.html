<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 300px; padding: 10px; font-family: sans-serif; }
    h2 { font-size: 14px; border-bottom: 2px solid #007bff; padding-bottom: 5px; }
    .group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-size: 12px; }
    textarea { width: 100%; height: 80px; font-size: 12px; }
    button { width: 100%; padding: 8px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 4px; font-weight: bold; }
    button#stopBtn { background: #dc3545; margin-top: 5px; display: none;}
    .radio-group label { display: inline-block; margin-right: 10px; cursor: pointer; }
    input[type="number"] { width: 50px; }
  </style>
</head>
<body>
  <h2>🤖 MAPS X 自動出力</h2>

  <div class="group">
    <label><b>1. 押すボタンを選択</b></label>
    <div class="radio-group">
      <label><input type="radio" name="targetBtn" value="印刷"> 印刷</label>
      <label><input type="radio" name="targetBtn" value="PDF出力" checked> PDF</label><br>
      <label><input type="radio" name="targetBtn" value="プレビュー"> プレビュー</label>
      <label><input type="radio" name="targetBtn" value="EXCEL出力"> EXCEL</label>
    </div>
  </div>

  <div class="group">
    <label><b>2. 拠点コードリスト (カンマ区切り)</b></label>
    <textarea id="baseList">000, 010, 011, 013, 014, 015, 016, 018, 022, 076, 077</textarea>
    <div style="font-size:10px; color:#666; margin-top:2px;">※必要なコードを入力してください</div>
  </div>

  <div class="group">
    <label><b>3. 待機時間 (秒)</b></label>
    <input type="number" id="interval" value="3" min="1"> 秒ごとに実行
  </div>

  <button id="startBtn">▶ 連続実行スタート</button>
  <button id="stopBtn">■ 中断</button>
  
  <div id="status" style="margin-top:10px; font-size:12px; color:#007bff;"></div>

  <script src="popup.js"></script>
</body>
</html>
